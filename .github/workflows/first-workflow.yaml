name: First GitHub Actions Workflow

on:
  push:
    branches:
      - main

jobs:
  hello-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show current directory
        run: pwd
      
      - name: List All Files
        run: ls -la
      - name: display python version
        run: python3 --version
     
      - name: execute application
        run: python3 app.py
